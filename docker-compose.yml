# ============================================================
# docker-compose.yml - Front-End + Back-End
# Usar na raiz do projeto para subir tudo junto
# ============================================================
# USO:
#   docker-compose up --build          (subir tudo)
#   docker-compose up --build frontend (so o front)
#   docker-compose up --build backend  (so o back)
#   docker-compose down                (parar tudo)
# ============================================================

version: "3.9"

services:
  # --------------------------------------------------------
  # BACK-END: Python / FastAPI
  # --------------------------------------------------------
  backend:
    image: csa-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    environment:
      ENV: production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:8080/api/v1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # --------------------------------------------------------
  # FRONT-END: Next.js 16
  # --------------------------------------------------------
  frontend:
    image: csa-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-}
        - NEXT_PUBLIC_ENTRA_CLIENT_ID=${NEXT_PUBLIC_ENTRA_CLIENT_ID:-}
        - NEXT_PUBLIC_ENTRA_TENANT_ID=${NEXT_PUBLIC_ENTRA_TENANT_ID:-}
        - NEXT_PUBLIC_ENTRA_REDIRECT_URI=${NEXT_PUBLIC_ENTRA_REDIRECT_URI:-}
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8080
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
