version: "3.9"

services:
  api:
    image: backend-a12022:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      ENV: development
      UVICORN_RELOAD: "true"
      # DATABASE_URL: postgresql://USER:PASS@HOST/DB?sslmode=require
      # AWS_SESSION_TOKEN: troque-por-chave-segura
      # STORAGE_PROVIDER: local
      # AUTH_MODE: local
      # EMAIL_PROVIDER: dev
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --lifespan off
