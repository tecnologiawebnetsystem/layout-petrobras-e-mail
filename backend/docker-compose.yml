version: "3.9"

services:
  api:
    image: backend-a12022:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      ENV: development
      UVICORN_RELOAD: "true"

      # AWS (SDKs usam isso, não o pipeline)
      # AWS_REGION: us-east-1
      # AWS_DEFAULT_REGION: us-east-1
      # AWS_PROFILE: default
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload
      --lifespan off
