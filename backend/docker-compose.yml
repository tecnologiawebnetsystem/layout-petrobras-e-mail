version: "3.9"

services:
  api:
    image: backend-a12022:dev
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      ENV: development
      UVICORN_RELOAD: "true"
      # DATABASE_URL: postgresql://USER:PASS@HOST/DB?sslmode=require
      # AWS_SESSION_TOKEN: troque-por-chave-segura
      # STORAGE_PROVIDER: local
      # AUTH_MODE: local
      # EMAIL_PROVIDER: dev
    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8080
      --reload
      --lifespan off

  mip-sdk-worker:
    image: mip-sdk-worker:dev
    build:
      context: .
      dockerfile: mip-sdk-worker/Dockerfile
    ports:
      - "8081:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8081
      ENTRAID__TENANTID: ${ENTRAID_TENANT_ID:-}
      ENTRAID__CLIENTID: ${ENTRAID_CLIENT_ID_PURVIEW:-}
      ENTRAID__CLIENTSECRET: ${ENTRAID_CLIENT_SECRET_PURVIEW:-}
      MIPWORKER__SERVICEAPITOKEN: ${MIP_SDK_API_TOKEN:-}
      MIPWORKER__PROCESSINGTIMEOUTSECONDS: 120
      MIPWORKER__MAXFILESIZBYTES: 52428800
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
