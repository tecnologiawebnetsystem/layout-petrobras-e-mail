[pytest]
# Diretório de testes
testpaths = tests

# Coleta apenas arquivos com prefixo test_ (padrão pytest convencional).
# Arquivos como s3_integration_test.py são scripts de execução manual —
# não devem ser coletados pelo pytest no pipeline de CI.
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers registrados
markers =
    integration: testes que requerem acesso real à AWS.
                 Variáveis necessárias injetadas pelo pipeline CDK via Parameter Store:
                 /APP/scac-dsv/AWS_S3_BUCKET e /APP/scac-dsv/AWS_REGION.
                 Ignorados automaticamente quando AWS_S3_BUCKET não está definido.

# Diretórios ignorados na coleta
norecursedirs = .git .venv venv storage scripts_data AWS docs

# Output detalhado por padrão + cobertura de código
addopts = 
    -v
    -s
    --tb=short
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    -m "not integration"