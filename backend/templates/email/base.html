
<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8"/>
    <title>{{ subject or app_name }}</title>
    <style>
      body { font-family: Arial, Helvetica, sans-serif; color:#222; }
      .container{ max-width:640px; margin:24px auto; padding:24px; border:1px solid #eee; border-radius:8px; }
      .btn { display:inline-block; background:#2563eb; color:#fff; text-decoration:none; padding:10px 16px; border-radius:6px;}
      .muted{ color:#666; font-size:12px; }
      .code{ font-size:22px; font-weight:700; letter-spacing:2px; }
    </style>
  </head>
  <body>
    <div class="container">
      {% block content %}{% endblock %}
      <hr/>
      <p class="muted">{{ company_name }} · Suporte: mailto:{{ support_email }}{{ support_email }}</a></p>
    </div>
  </body>
</html>
